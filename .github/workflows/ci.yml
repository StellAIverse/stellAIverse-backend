name: Build, Test & Security Check

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'refactor/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run tests
        run: npm run test:cov
        env:
          CI: true

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: warn

      - name: Run security audit
        run: npm run security:audit
        env:
          CI: true

      - name: Check build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/main.js" ]; then
            echo "❌ Build failed: main.js not found in dist"
            exit 1
          fi
          echo "✅ Build artifacts verified"

  summary:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()

    steps:
      - name: Report job status
        run: |
          echo "## CI Pipeline Summary"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Lint | ${{ needs.build-and-test.result }} |"
          echo "| Build | ${{ needs.build-and-test.result }} |"
          echo "| Tests | ${{ needs.build-and-test.result }} |"
          echo "| Security Audit | ${{ needs.build-and-test.result }} |"
          echo ""
          
          if [ "${{ needs.build-and-test.result }}" == "failure" ]; then
            echo "❌ Pipeline failed - please review build logs"
            exit 1
          fi
          
          echo "✅ All checks passed! Build, tests, and security audit completed successfully."